# Decay Sweep Configuration
# Pilot A: Find freeze boundary

[sweep]
parameter = decay_scale
values = 1.0, 0.85, 0.8, 0.75
seeds = 42, 123

[simulation]
ticks = 600
nodes = 2000
init_edges = 6000

[parameters]
# Keep everything else at baseline
spawn_scale = 1.0
tension_scale = 1.0

[output]
dump_graph_every = 100
log_interval = 50

[analysis]
# Pre-registered analysis params
tick = 400
wcluster = 0.02
wbridge = 0.0
wdist = 0.005
wdist_mode = threshold
min_cluster_size = 2
disconnected_policy = maxdist

[metrics]
# Required metrics
freeze_tick = true
bridges_at_tick = true
hub_share = true
range = true
singleton_pct = true
