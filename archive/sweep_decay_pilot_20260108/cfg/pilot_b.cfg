# Decay Sweep Configuration
# Pilot B: Refine boundary region

[sweep]
parameter = decay_scale
values = 0.95, 0.9, 0.875, 0.825, 0.775, 0.7, 0.65, 0.6
seeds = 42, 123

[simulation]
ticks = 600
nodes = 2000
init_edges = 6000

[parameters]
spawn_scale = 1.0
tension_scale = 1.0

[output]
dump_graph_every = 100
log_interval = 50

[analysis]
tick = 400
wcluster = 0.02
wbridge = 0.0
wdist = 0.005
wdist_mode = threshold
min_cluster_size = 2
disconnected_policy = maxdist

[metrics]
freeze_tick = true
bridges_at_tick = true
hub_share = true
range = true
singleton_pct = true

[notes]
# Pilot B focuses on 0.8-0.85 boundary region
# Plus extends to lower decay values
