# Test C - Run 2: Decay Slow
# Winner configuration - prevents freeze

[simulation]
ticks = 600
seed = 42

[parameters]
spawn_scale = 1.0
decay_scale = 0.7  # SLOW decay
tension_scale = 1.0

[output]
dump_graph_every = 100

[notes]
# This config keeps system active @ tick 400
# Baseline freezes @ ~400, this stays active
# Result: 246 bridges @ 400
