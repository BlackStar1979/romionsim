# ROMION Configuration File: Baseline
# Default parameters for baseline runs

[simulation]
ticks = 1000
nodes = 2000
init_edges = 6000
seed = 42

[parameters]
# Spawn
spawn_threshold = 0.15
spawn_samples = 1500
spawn_damping = 0.55
spawn_cap = 1500
spawn_scale = 1.0

# Decay
decay = 0.008
decay_kappa_discount = 0.9
decay_scale = 1.0

# Weights
min_weight = 0.005
W_max = 2.5
w_cap = 2.5

# Tension
theta = 0.25
beta_2hop = 0.25
twohop_sample = 15
tension_scale = 1.0

# Reinforcement
reinforce_factor = 0.05
time_alpha_scale = 1.0

# Quantum Spark (disabled)
enable_spark = false
epsilon_spark = 0.0
spark_w = 0.0

# S2-tail (disabled)
enable_s2_tail = false

[output]
log_interval = 50
dump_graph_every = 0
