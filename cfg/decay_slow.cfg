# ROMION Configuration File: Slow Decay
# decay_scale = 0.7 (R2 winner config)

[simulation]
ticks = 600
nodes = 2000
init_edges = 6000
seed = 42

[parameters]
# Spawn (baseline)
spawn_scale = 1.0

# Decay (SLOW - prevents freeze)
decay_scale = 0.7

# Tension (baseline)
tension_scale = 1.0

# All other params: baseline defaults

[output]
log_interval = 50
dump_graph_every = 100  # For freeze detection

[analysis]
# Pre-registered analysis params
wcluster = 0.02
wbridge = 0.0
wdist = 0.005
wdist_mode = threshold
min_cluster_size = 2
